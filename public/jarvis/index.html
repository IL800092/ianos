<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#030812" />
<title>IAN.OS // JARVIS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   IAN.OS // JARVIS — Iron-Man-HUD life dashboard
   Single file, no build step, no frameworks, no API keys.
   ============================================================ */
:root {
  --bg: #030812;
  --blue: #4da8ff;
  --bright: #a8dcff;
  --muted: #5b7ba6;
  --amber: #ffb454;
  --panel-bg: rgba(8, 18, 36, 0.55);
  --panel-border: rgba(77, 168, 255, 0.28);
  --spring: cubic-bezier(0.16, 1, 0.3, 1);
  --safe-t: env(safe-area-inset-top, 0px);
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-l: env(safe-area-inset-left, 0px);
  --safe-r: env(safe-area-inset-right, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--bright);
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 13px;
  overflow: hidden;
  height: 100dvh;
  width: 100vw;
}
button { font-family: inherit; color: inherit; background: none; border: none; cursor: pointer; }

/* ---------- background: grid, vignette, corner brackets ---------- */
.grid-bg {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    linear-gradient(rgba(77,168,255,0.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(77,168,255,0.045) 1px, transparent 1px);
  background-size: 48px 48px;
}
.vignette {
  position: fixed; inset: 0; pointer-events: none; z-index: 1;
  background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,4,0.75) 100%);
}
.corner { position: fixed; width: 26px; height: 26px; z-index: 60; pointer-events: none; opacity: 0.7; }
.corner.tl { top: calc(8px + var(--safe-t)); left: calc(8px + var(--safe-l)); border-top: 1px solid var(--blue); border-left: 1px solid var(--blue); }
.corner.tr { top: calc(8px + var(--safe-t)); right: calc(8px + var(--safe-r)); border-top: 1px solid var(--blue); border-right: 1px solid var(--blue); }
.corner.bl { bottom: calc(8px + var(--safe-b)); left: calc(8px + var(--safe-l)); border-bottom: 1px solid var(--blue); border-left: 1px solid var(--blue); }
.corner.br { bottom: calc(8px + var(--safe-b)); right: calc(8px + var(--safe-r)); border-bottom: 1px solid var(--blue); border-right: 1px solid var(--blue); }

/* ---------- header ---------- */
header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 40;
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: calc(16px + var(--safe-t)) calc(46px + var(--safe-r)) 10px calc(46px + var(--safe-l));
  pointer-events: none;
}
.wordmark {
  font-family: 'Chakra Petch', sans-serif; font-weight: 700; font-size: 17px;
  letter-spacing: 0.28em; text-transform: uppercase; color: var(--bright);
  text-shadow: 0 0 18px rgba(77,168,255,0.5);
  white-space: nowrap;
}
.wordmark .slash { color: var(--blue); }
.wordmark .sub {
  display: block; font-size: 8px; letter-spacing: 0.42em; color: var(--muted);
  font-weight: 500; margin-top: 4px;
}
.hud-meta { text-align: right; font-size: 11px; color: var(--muted); line-height: 1.7; white-space: nowrap; }
#clock { font-size: 16px; color: var(--bright); letter-spacing: 0.1em; }
#clock .sec { color: var(--blue); }
#session-timer { letter-spacing: 0.12em; }

/* ---------- tab chips ---------- */
#chips {
  position: fixed; z-index: 45;
  top: calc(86px + var(--safe-t)); left: calc(16px + var(--safe-l));
  display: flex; flex-direction: column; gap: 7px;
  max-height: calc(100dvh - 220px); overflow-y: auto;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
#chips::-webkit-scrollbar { display: none; }
.chip {
  font-family: 'Chakra Petch', sans-serif; font-weight: 600; font-size: 10px;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--muted); border: 1px solid rgba(77,168,255,0.22);
  background: rgba(8,18,36,0.5); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  padding: 7px 13px; border-radius: 3px; text-align: left; white-space: nowrap;
  transition: color .25s var(--spring), border-color .25s var(--spring), box-shadow .25s var(--spring);
}
.chip:hover { color: var(--bright); border-color: rgba(77,168,255,0.5); }
.chip.active {
  color: var(--bright); border-color: var(--blue);
  box-shadow: 0 0 14px rgba(77,168,255,0.25), inset 0 0 10px rgba(77,168,255,0.08);
}

/* ---------- orb ---------- */
#orb-wrap {
  position: fixed; z-index: 5; left: 50%; top: 50%;
  transform: translate(-50%, -56%);
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  pointer-events: none;
}
#orb-glow {
  position: absolute; inset: -18%; border-radius: 50%;
  background: radial-gradient(circle, rgba(77,168,255,0.16) 0%, rgba(77,168,255,0.05) 45%, transparent 70%);
}
#orb { display: block; }
#orb-label {
  font-family: 'Chakra Petch', sans-serif; font-size: 10px; font-weight: 600;
  letter-spacing: 0.5em; text-transform: uppercase; color: var(--muted);
  text-indent: 0.5em; transition: color .4s;
}
#orb-label.hot { color: var(--blue); }

/* ---------- panel dock ---------- */
#dock {
  position: fixed; z-index: 50;
  top: calc(86px + var(--safe-t)); right: calc(16px + var(--safe-r));
  width: min(400px, calc(100vw - 32px));
  max-height: calc(100dvh - 240px);
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  display: flex; flex-direction: column; gap: 12px;
  scrollbar-width: thin; scrollbar-color: rgba(77,168,255,0.3) transparent;
}
#dock .grab { display: none; }
.panel {
  background: var(--panel-bg);
  backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
  border: 1px solid var(--panel-border);
  border-radius: 6px;
  box-shadow: 0 18px 50px rgba(0,0,6,0.6), inset 0 0 30px rgba(77,168,255,0.04);
  overflow: hidden; flex-shrink: 0;
  transition: opacity .55s var(--spring), transform .55s var(--spring), filter .55s var(--spring);
}
.panel.enter { opacity: 0; transform: translateY(16px) scale(0.94); filter: blur(10px); }
.panel.leave { opacity: 0; transform: translateY(10px) scale(0.96); filter: blur(6px); transition-duration: .3s; }
.panel-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 11px 14px 9px; border-bottom: 1px solid rgba(77,168,255,0.16);
}
.panel-head h2 {
  font-family: 'Chakra Petch', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: 0.3em; text-transform: uppercase; color: var(--bright);
  text-shadow: 0 0 12px rgba(77,168,255,0.45);
}
.panel-x { color: var(--muted); font-size: 13px; padding: 2px 6px; line-height: 1; }
.panel-x:hover { color: var(--amber); }
.panel-body { padding: 6px 14px 12px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.sec-label {
  font-family: 'Chakra Petch', sans-serif; font-size: 9px; font-weight: 600;
  letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted);
  margin: 12px 0 4px; padding-bottom: 4px; border-bottom: 1px dashed rgba(91,123,166,0.25);
}
.row { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; padding: 6px 0; }
.row + .row { border-top: 1px solid rgba(77,168,255,0.06); }
.row-main { flex: 1; min-width: 0; }
.row-l { font-size: 12.5px; color: var(--bright); line-height: 1.45; }
.row-sub { font-size: 10px; color: var(--muted); margin-top: 1px; line-height: 1.4; }
.row-r {
  font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--blue); white-space: nowrap; text-align: right;
}
.row-r.warn { color: var(--amber); text-shadow: 0 0 10px rgba(255,180,84,0.35); }
.meter {
  height: 3px; border-radius: 2px; background: rgba(77,168,255,0.12);
  margin-top: 6px; overflow: hidden;
}
.meter i {
  display: block; height: 100%; border-radius: 2px;
  background: var(--blue); box-shadow: 0 0 8px rgba(77,168,255,0.8);
  transition: width .8s var(--spring);
}
.meter i.warn { background: var(--amber); box-shadow: 0 0 8px rgba(255,180,84,0.8); }

/* ---------- transcript ---------- */
#transcript {
  position: fixed; z-index: 30;
  bottom: calc(88px + var(--safe-b)); left: 50%; transform: translateX(-50%);
  width: min(620px, calc(100vw - 28px));
  max-height: 38dvh; overflow-y: auto; -webkit-overflow-scrolling: touch;
  display: flex; flex-direction: column; gap: 8px;
  padding: 34px 4px 4px;
  -webkit-mask-image: linear-gradient(to bottom, transparent 0, black 36px);
  mask-image: linear-gradient(to bottom, transparent 0, black 36px);
  scrollbar-width: none;
}
#transcript::-webkit-scrollbar { display: none; }
.msg { display: flex; flex-direction: column; max-width: 86%;
  transition: opacity .45s var(--spring), transform .45s var(--spring), filter .45s var(--spring); }
.msg.enter { opacity: 0; transform: translateY(10px) scale(0.96); filter: blur(6px); }
.msg.user { align-self: flex-end; align-items: flex-end; }
.msg.ai { align-self: flex-start; align-items: flex-start; }
.msg .eyebrow {
  font-family: 'Chakra Petch', sans-serif; font-size: 8px; font-weight: 600;
  letter-spacing: 0.4em; text-transform: uppercase; color: var(--muted); margin: 0 4px 3px;
}
.bubble {
  padding: 8px 12px; border-radius: 5px; font-size: 12px; line-height: 1.55;
  border: 1px solid; word-break: break-word; white-space: pre-wrap;
}
.msg.user .bubble { background: rgba(77,168,255,0.13); border-color: rgba(77,168,255,0.35); color: var(--bright); }
.msg.ai .bubble { background: rgba(8,18,36,0.6); border-color: rgba(77,168,255,0.18); color: var(--bright);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
.msg.ai .bubble.warn { border-color: rgba(255,180,84,0.4); color: var(--amber); }
.bubble.blob { max-height: 180px; overflow-y: auto; font-size: 10px; color: var(--muted); user-select: all; -webkit-user-select: all; }
.dots { display: inline-flex; gap: 5px; padding: 3px 2px; }
.dots i {
  width: 5px; height: 5px; border-radius: 50%; background: var(--blue);
  animation: dot 1.2s infinite ease-in-out;
}
.dots i:nth-child(2) { animation-delay: .15s; }
.dots i:nth-child(3) { animation-delay: .3s; }
@keyframes dot { 0%, 70%, 100% { opacity: .25; transform: translateY(0); } 35% { opacity: 1; transform: translateY(-3px); } }

/* ---------- command bar ---------- */
#cmdbar {
  position: fixed; z-index: 55;
  bottom: calc(16px + var(--safe-b)); left: 50%; transform: translateX(-50%);
  width: min(620px, calc(100vw - 28px));
  display: flex; align-items: center; gap: 8px;
  background: rgba(8,18,36,0.72);
  backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
  border: 1px solid var(--panel-border); border-radius: 8px;
  padding: 8px 10px;
  box-shadow: 0 14px 40px rgba(0,0,6,0.65);
}
#cmd {
  flex: 1; min-width: 0; background: transparent; border: none; outline: none;
  color: var(--bright); font-family: inherit;
  font-size: 16px; /* prevents iOS Safari focus zoom */
  caret-color: var(--blue);
}
#cmd::placeholder { color: var(--muted); opacity: .8; }
.bar-btn {
  font-family: 'Chakra Petch', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: 0.14em; color: var(--muted);
  border: 1px solid rgba(77,168,255,0.22); border-radius: 4px;
  padding: 7px 10px; transition: color .2s, border-color .2s, box-shadow .2s;
  white-space: nowrap;
}
.bar-btn:hover { color: var(--bright); border-color: rgba(77,168,255,0.5); }
.bar-btn.on { color: var(--blue); border-color: var(--blue); box-shadow: 0 0 10px rgba(77,168,255,0.3); }
.bar-btn.live { color: var(--amber); border-color: var(--amber); box-shadow: 0 0 10px rgba(255,180,84,0.4);
  animation: micpulse 1.4s infinite; }
@keyframes micpulse { 50% { box-shadow: 0 0 18px rgba(255,180,84,0.7); } }
#send { color: var(--blue); border-color: rgba(77,168,255,0.45); }

/* ---------- toasts ---------- */
#toasts {
  position: fixed; z-index: 90; bottom: calc(84px + var(--safe-b));
  left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; gap: 8px; align-items: center;
  width: min(560px, calc(100vw - 40px)); pointer-events: none;
}
.toast {
  background: rgba(20,14,4,0.85); border: 1px solid rgba(255,180,84,0.5);
  color: var(--amber); font-size: 11px; line-height: 1.5;
  padding: 9px 14px; border-radius: 5px;
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  box-shadow: 0 10px 30px rgba(0,0,4,0.6);
  transition: opacity .4s var(--spring), transform .4s var(--spring);
}
.toast.enter { opacity: 0; transform: translateY(8px) scale(0.96); }

/* ============================================================
   iPhone PORTRAIT — bottom sheets, chip row, orb upper third
   ============================================================ */
@media (max-width: 720px) and (orientation: portrait) {
  header { padding: calc(10px + var(--safe-t)) 40px 6px calc(16px + var(--safe-l)); }
  .wordmark { font-size: 13px; letter-spacing: 0.2em; }
  .wordmark .sub { display: none; }
  .hud-meta { font-size: 9px; line-height: 1.5; }
  #clock { font-size: 12px; }

  #chips {
    top: calc(52px + var(--safe-t)); left: 0; right: 0;
    flex-direction: row; max-height: none; overflow-x: auto; overflow-y: hidden;
    padding: 4px calc(16px + var(--safe-l)) 4px calc(16px + var(--safe-l));
  }
  #orb-wrap { top: 33%; transform: translate(-50%, -50%); }

  #dock {
    top: auto; right: 0; left: 0; bottom: 0;
    width: 100%; max-height: 62dvh;
    background: rgba(6,14,28,0.82);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--panel-border); border-bottom: none;
    border-radius: 14px 14px 0 0;
    padding: 6px 12px calc(78px + var(--safe-b));
    transform: translateY(105%);
    transition: transform .55s var(--spring);
    box-shadow: 0 -18px 50px rgba(0,0,6,0.7);
  }
  #dock.open { transform: translateY(0); }
  #dock .grab {
    display: block; width: 40px; height: 4px; border-radius: 2px;
    background: rgba(91,123,166,0.5); margin: 4px auto 8px; flex-shrink: 0;
  }
  .panel { background: transparent; border: none; box-shadow: none;
    backdrop-filter: none; -webkit-backdrop-filter: none; }
  .panel + .panel { border-top: 1px solid rgba(77,168,255,0.14); }

  #transcript { bottom: calc(78px + var(--safe-b)); max-height: 30dvh; }
  #cmdbar { bottom: calc(10px + var(--safe-b)); }
}

/* ============================================================
   iPhone LANDSCAPE — orb left, panels right, transcript bottom-left
   ============================================================ */
@media (max-height: 520px) and (orientation: landscape) {
  header { padding: calc(8px + var(--safe-t)) calc(38px + var(--safe-r)) 4px calc(38px + var(--safe-l)); }
  .wordmark { font-size: 12px; }
  .wordmark .sub { display: none; }
  .hud-meta { display: flex; gap: 12px; font-size: 9px; align-items: baseline; }
  #clock { font-size: 12px; }

  #chips {
    top: calc(44px + var(--safe-t)); left: calc(10px + var(--safe-l));
    max-height: calc(100dvh - 120px);
  }
  .chip { padding: 5px 9px; font-size: 9px; }
  #orb-wrap { left: 27%; top: 52%; transform: translate(-50%, -50%) scale(0.72); }

  #dock {
    top: calc(44px + var(--safe-t)); right: 0; bottom: 0;
    width: 46vw; max-height: none;
    height: calc(100dvh - 44px - var(--safe-t));
    background: rgba(6,14,28,0.82);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border-left: 1px solid var(--panel-border);
    padding: 10px 10px calc(10px + var(--safe-b)) 10px;
    padding-right: calc(10px + var(--safe-r));
    transform: translateX(108%);
    transition: transform .55s var(--spring);
  }
  #dock.open { transform: translateX(0); }
  .panel { background: transparent; border: none; box-shadow: none;
    backdrop-filter: none; -webkit-backdrop-filter: none; }
  .panel + .panel { border-top: 1px solid rgba(77,168,255,0.14); }

  #transcript {
    left: calc(96px + var(--safe-l)); transform: none;
    width: 38vw; bottom: calc(64px + var(--safe-b)); max-height: 34dvh;
  }
  #cmdbar {
    left: calc(96px + var(--safe-l)); transform: none;
    width: 44vw; bottom: calc(8px + var(--safe-b));
  }
}

/* ---------- reduced motion ---------- */
@media (prefers-reduced-motion: reduce) {
  * { transition-duration: .01ms !important; animation-duration: .01ms !important; animation-iteration-count: 1 !important; }
}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="vignette"></div>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>

<header>
  <div class="wordmark">IAN.OS <span class="slash">//</span> JARVIS
    <span class="sub">LIFE MANAGEMENT INTERFACE · GR12 · FALL 2027 RUNWAY</span>
  </div>
  <div class="hud-meta">
    <div id="clock">--:--:<span class="sec">--</span></div>
    <div id="hud-date">—</div>
    <div id="session-timer">SESSION T+00:00:00</div>
  </div>
</header>

<div id="chips"></div>

<div id="orb-wrap">
  <div id="orb-glow"></div>
  <canvas id="orb"></canvas>
  <div id="orb-label">STANDBY</div>
</div>

<div id="dock"><div class="grab"></div></div>

<div id="transcript"></div>

<div id="cmdbar">
  <button id="mic" class="bar-btn" aria-label="Voice input">MIC</button>
  <input id="cmd" type="text" placeholder="Command, question, or pasted JSON…"
         autocomplete="off" autocapitalize="off" spellcheck="false" enterkeyhint="send" />
  <button id="vox" class="bar-btn" aria-label="Toggle voice replies">VOX</button>
  <button id="send" class="bar-btn" aria-label="Send">SEND</button>
</div>

<div id="toasts"></div>

<script>
"use strict";
/* ============================================================
   0. UTILITIES
   ============================================================ */
const $ = (s) => document.querySelector(s);
const REDUCED = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

// Every user- or AI-supplied string passes through esc() before hitting innerHTML.
const esc = (s) => String(s).replace(/[&<>"']/g, (c) =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

const slugify = (s) => String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "").slice(0, 48) || "panel";
const clamp = (n, a, b) => Math.min(b, Math.max(a, n));
const pad2 = (n) => String(n).padStart(2, "0");

function daysUntil(iso) {
  const t = new Date(iso + "T00:00:00");
  if (isNaN(t)) return null;
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.round((t - today) / 86400000);
}

function toast(text, ms = 4200) {
  const el = document.createElement("div");
  el.className = "toast enter";
  el.textContent = text;
  $("#toasts").appendChild(el);
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.remove("enter")));
  setTimeout(() => { el.classList.add("enter"); setTimeout(() => el.remove(), 450); }, ms);
}

/* ============================================================
   1. PANEL DATA — defaults, storage, IAN.OS adapter
   ============================================================ */
const STORE_KEY = "ianos-jarvis-panels-v6";
const IANOS_KEY = "ianos:v1";
// Core panels: protected from deletion (updates allowed on all).
const CORE_IDS = ["today", "university-ops", "vertical-protocol", "active-builds", "life-stats", "ec-portfolio"];

function defaultPanels() {
  return [
    { id: "today", title: "Today · Grade 12", tab: "Today", sections: [
      { label: "Classes", rows: [
        { l: "AP Calculus", sub: "Period 1", r: "08:30" },
        { l: "AP Chemistry", sub: "Period 2", r: "09:45" },
        { l: "AP Physics", sub: "Period 3", r: "11:00" },
        { l: "English", sub: "Period 4", r: "13:00" },
        { l: "AP Biology", sub: "Period 5", r: "14:15" },
        { l: "Music", sub: "Alto sax", r: "15:30" },
      ]},
      { label: "Training", rows: [
        { l: "Vertical jump — lower session", sub: "Iso holds → clean → squat → RDL", r: "17:30", warn: true },
      ]},
    ]},
    { id: "university-ops", title: "University Ops", tab: "Uni", sections: [
      { label: "UK Medicine", rows: [
        { l: "UCAT", sub: "Book + prep — summer 2026 window", r: "SUMMER WINDOW", warn: true },
        { l: "UCAS deadline", sub: "Oct 15 2026 — hard deadline", r: "", due: "2026-10-15", warn: true },
      ]},
      { label: "North America", rows: [
        { l: "SAT retake", sub: "Aug–Sep 2026", r: "TARGET 1450–1500" },
        { l: "OUAC", sub: "Waterloo Tron · McMaster · TMU", r: "CANADA" },
        { l: "Common App essay", sub: "Draft in progress", r: "55%", meter: 55 },
        { l: "UC Berkeley", sub: "Test-blind — PIQs", r: "QUEUED" },
      ]},
    ]},

// -- validation / normalization of any incoming panel spec (AI or paste) --
function sanitizePanel(spec) {
  if (!spec || typeof spec !== "object") return null;
  const p = {
    id: slugify(spec.id || spec.title || "panel"),
    title: String(spec.title || spec.id || "PANEL"),
    tab: String(spec.tab || spec.title || spec.id || "Panel").slice(0, 18),
    sections: [],
  };
  const secs = Array.isArray(spec.sections) ? spec.sections : [];
  for (const s of secs) {
    if (!s || typeof s !== "object") continue;
    const sec = { label: s.label == null ? null : String(s.label), rows: [] };
    if (s._sync) sec._sync = String(s._sync);
    for (const r of (Array.isArray(s.rows) ? s.rows : [])) {
      if (!r || typeof r !== "object") continue;
      const row = { l: String(r.l ?? r.label ?? "") };
      if (r.sub != null) row.sub = String(r.sub);
      row.r = String(r.r ?? r.right ?? "");
      if (r.warn) row.warn = true;
      if (r.meter != null && isFinite(+r.meter)) row.meter = clamp(+r.meter, 0, 100);
      if (typeof r.due === "string" && /^\d{4}-\d{2}-\d{2}$/.test(r.due)) row.due = r.due;
      if (typeof r.key === "string") row.key = r.key;
      if (r._edited) row._edited = true;
      sec.rows.push(row);
    }
    p.sections.push(sec);
  }
  if (!p.sections.length) return null;
  return p;
}

let panels = [];

function loadPanels() {
  let stored = null;
  try { stored = JSON.parse(localStorage.getItem(STORE_KEY)); } catch {}
  if (Array.isArray(stored) && stored.length) {
    panels = stored.map(sanitizePanel).filter(Boolean);
  }
  if (!panels.length) panels = defaultPanels();
  applyIanosOverlay();
}

function savePanels() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(panels)); }
  catch (e) { toast("Couldn't persist panels: " + e.message); }
}

/* Adapter: read the main IAN.OS app's saved state (key "ianos:v1") and
   overlay live data onto the core panels — latest gym log weights onto
   Vertical Protocol (matched via row.key ↔ gym exercise id), open tasks
   onto Today, and checklist progress onto University Ops. Rows edited
   through JARVIS (row._edited) are never overwritten. Falls back to the
   hardcoded defaults when the key is absent or malformed. */
function applyIanosOverlay() {
  let state = null;
  try { state = JSON.parse(localStorage.getItem(IANOS_KEY)); } catch {}
  const stripSync = (p) => { if (p) p.sections = p.sections.filter((s) => !s._sync); };
  const today = panels.find((p) => p.id === "today");
  const uni = panels.find((p) => p.id === "university-ops");
  if (!state || typeof state !== "object") { stripSync(today); stripSync(uni); return; }

  // gym logs → Vertical Protocol lift numbers
  try {
    const vp = panels.find((p) => p.id === "vertical-protocol");
    const logs = state.gym && Array.isArray(state.gym.logs) ? state.gym.logs : [];
    if (vp && logs.length) {
      const latest = {};
      for (const log of logs) {
        if (!log || !log.exId) continue;
        if (!latest[log.exId] || String(log.date || "") >= String(latest[log.exId].date || "")) latest[log.exId] = log;
      }
      for (const sec of vp.sections) for (const row of sec.rows) {
        const hit = row.key && latest[row.key];
        if (hit && !row._edited && isFinite(+hit.weight)) row.r = (+hit.weight) + " LB";
      }
    }
  } catch {}

  // open tasks → Today
  try {
    if (today && Array.isArray(state.tasks)) {
      stripSync(today);
      const open = state.tasks.filter((t) => t && !t.done && t.text).slice(0, 6);
      if (open.length) {
        today.sections.push({ label: "Tasks · synced from IAN.OS", _sync: "tasks", rows: open.map((t) => {
          const d = t.due ? daysUntil(t.due) : null;
          return { l: String(t.text), sub: t.due ? "due " + t.due : undefined,
                   r: d == null ? "OPEN" : (d < 0 ? "OVERDUE" : d + "D"),
                   warn: d != null && d <= 7 };
        })});
      }
    }
  } catch {}

  // uni checklist progress → University Ops
  try {
    if (uni && state.uni) {
      stripSync(uni);
      const rows = [];
      const add = (label, arr) => {
        if (!Array.isArray(arr) || !arr.length) return;
        const done = arr.filter((i) => i && i.done).length;
        const pct = Math.round((done / arr.length) * 100);
        rows.push({ l: label, sub: done + " of " + arr.length + " complete", r: pct + "%", meter: pct });
      };
      add("UK Medicine checklist", state.uni.uk);
      add("North America checklist", state.uni.na);
      if (rows.length) uni.sections.push({ label: "Checklist sync · IAN.OS", _sync: "uni", rows });
    }
  } catch {}
}

function renderChips() {

function rowHTML(r) {
  let right = r.r;
  if (r.due) { // live countdown rows recompute on every render
    const d = daysUntil(r.due);
    if (d != null) right = d < 0 ? "PAST DUE" : d + " DAYS";
  }
  const warnCls = r.warn ? " warn" : "";
  return '<div class="row"><div class="row-main">'
    + '<div class="row-l">' + esc(r.l) + '</div>'
    + (r.sub ? '<div class="row-sub">' + esc(r.sub) + '</div>' : '')
    + (r.meter != null ? '<div class="meter"><i class="' + (r.warn ? 'warn' : '') + '" style="width:' + clamp(+r.meter, 0, 100) + '%"></i></div>' : '')
    + '</div><div class="row-r' + warnCls + '">' + esc(right) + '</div></div>';
}

function panelHTML(p) {
  let h = '<div class="panel-head"><h2>' + esc(p.title) + '</h2>'
        + '<button class="panel-x" data-close="' + esc(p.id) + '" aria-label="Close panel">✕</button></div>'
        + '<div class="panel-body">';
  for (const sec of p.sections) {
    if (sec.label) h += '<div class="sec-label">' + esc(sec.label) + '</div>';
    for (const r of sec.rows) h += rowHTML(r);
  }
  return h + '</div>';
}

function renderDock({ animateId = null } = {}) {
  const dock = $("#dock");
  dock.querySelectorAll(".panel").forEach((el) => el.remove());
  for (const id of openIds) {
    const p = panels.find((x) => x.id === id);
    if (!p) continue;
    const el = document.createElement("section");
    el.className = "panel" + (id === animateId ? " enter" : "");
    el.dataset.id = p.id;
    el.innerHTML = panelHTML(p);
    dock.appendChild(el);
    if (id === animateId) requestAnimationFrame(() => requestAnimationFrame(() => el.classList.remove("enter")));
  }
  dock.classList.toggle("open", openIds.length > 0);
  renderChips();
}

function openPanel(id, { rerender = true } = {}) {
  const p = panels.find((x) => x.id === id);
  if (!p) return false;
  const i = openIds.indexOf(id);
  if (i !== -1) openIds.splice(i, 1);
  openIds.unshift(id);
  if (rerender) renderDock({ animateId: id });
  return true;
}

function closePanel(id) {
  const i = openIds.indexOf(id);
  if (i === -1) return;
  const el = document.querySelector('.panel[data-id="' + CSS.escape(id) + '"]');
  openIds.splice(i, 1);
  if (el && !REDUCED) {
    el.classList.add("leave");
    setTimeout(() => renderDock(), 280);
  } else renderDock();
}

function closeAllPanels() { openIds.length = 0; renderDock(); }

function togglePanel(id) {
  if (openIds.includes(id)) closePanel(id); else openPanel(id);
}

/* ============================================================
   3. ORB — 750-particle 3D-projected sphere on canvas
   ============================================================ */
const orb = (() => {
  const canvas = $("#orb"), ctx = canvas.getContext("2d");
  const N = 750, pts = [];
  // Fibonacci-sphere distribution
  const GA = Math.PI * (3 - Math.sqrt(5));
  for (let i = 0; i < N; i++) {
    const y = 1 - (i / (N - 1)) * 2;
    const rad = Math.sqrt(1 - y * y), th = GA * i;
    pts.push({ x: Math.cos(th) * rad, y, z: Math.sin(th) * rad });
  }
  // state targets: rotation speed, pulse amplitude/freq, ripple amplitude
  const STATES = {
    idle:      { speed: 0.0032, pulse: 0.012, pfreq: 1.1, ripple: 0 },
    listening: { speed: 0.0030, pulse: 0.075, pfreq: 2.2, ripple: 0 },
    thinking:  { speed: 0.024,  pulse: 0.018, pfreq: 1.6, ripple: 0 },
    speaking:  { speed: 0.009,  pulse: 0.02,  pfreq: 1.4, ripple: 0.06 },
  };
  const LABELS = { idle: "STANDBY", listening: "LISTENING", thinking: "PROCESSING", speaking: "SPEAKING" };
  let state = "idle";
  const cur = { ...STATES.idle };
  let rotY = 0, rotX = 0, t = 0, size = 0, dpr = 1;

  function resize() {
    const vmin = Math.min(window.innerWidth, window.innerHeight);
    size = clamp(vmin * 0.46, 190, 400);
    dpr = clamp(window.devicePixelRatio || 1, 1, 2.5);
    canvas.width = size * dpr; canvas.height = size * dpr;
    canvas.style.width = size + "px"; canvas.style.height = size + "px";
  }
  window.addEventListener("resize", resize);
  resize();

  function set(next) {
    if (!STATES[next]) return;
    state = next;
    const lab = $("#orb-label");
    lab.textContent = LABELS[next];
    lab.classList.toggle("hot", next !== "idle");
  }

  function frame() {
    const tgt = STATES[state];
    const k = REDUCED ? 1 : 0.06;
    for (const key in cur) cur[key] += (tgt[key] - cur[key]) * k;
    const spd = REDUCED ? cur.speed * 0.12 : cur.speed;
    rotY += spd; rotX = Math.sin(t * 0.24) * 0.35; t += 0.016;

    const c = size / 2, R = size * 0.30;
    const pulse = REDUCED ? 0 : Math.sin(t * cur.pfreq * Math.PI) * cur.pulse;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, size, size);

    // outer ring + 36 rotating ticks (every 3rd longer)
    ctx.save(); ctx.translate(c, c);
    ctx.strokeStyle = "rgba(77,168,255,0.35)"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(0, 0, size * 0.455, 0, Math.PI * 2); ctx.stroke();
    ctx.save(); ctx.rotate(REDUCED ? 0 : t * 0.12);
    for (let i = 0; i < 36; i++) {
      const a = (i / 36) * Math.PI * 2, long = i % 3 === 0;
      const r0 = size * 0.455, r1 = r0 - (long ? size * 0.026 : size * 0.012);
      ctx.strokeStyle = long ? "rgba(77,168,255,0.55)" : "rgba(77,168,255,0.3)";
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * r0, Math.sin(a) * r0);
      ctx.lineTo(Math.cos(a) * r1, Math.sin(a) * r1);
      ctx.stroke();
    }
    ctx.restore();
    // dashed inner ring, counter-rotating
    ctx.save(); ctx.rotate(REDUCED ? 0 : -t * 0.07);
    ctx.setLineDash([5, 7]);
    ctx.strokeStyle = "rgba(77,168,255,0.28)";
    ctx.beginPath(); ctx.arc(0, 0, size * 0.395, 0, Math.PI * 2); ctx.stroke();
    ctx.restore(); ctx.restore();

    // particles, painted back-to-front
    const cy = Math.cos(rotY), sy = Math.sin(rotY), cx = Math.cos(rotX), sx = Math.sin(rotX);
    const f = 2.4, proj = [];
    for (const p of pts) {
      let x = p.x * cy + p.z * sy, z0 = -p.x * sy + p.z * cy;
      let y = p.y * cx - z0 * sx, z = p.y * sx + z0 * cx;
      const rip = cur.ripple ? Math.sin(t * 5 + p.y * 6) * cur.ripple : 0;
      const rr = R * (1 + pulse + rip);
      const s = f / (f + z);
      proj.push({ px: c + x * rr * s, py: c + y * rr * s, z, s });
    }
    proj.sort((a, b) => b.z - a.z);
    for (const q of proj) {
      const depth = (1 - q.z) / 2; // 0 back → 1 front
      const alpha = 0.12 + depth * 0.68;
      const rad = (0.5 + depth * 1.25) * (size / 300);
      ctx.fillStyle = depth > 0.82 ? "rgba(168,220,255," + alpha.toFixed(3) + ")"
                                   : "rgba(77,168,255," + alpha.toFixed(3) + ")";
      ctx.beginPath(); ctx.arc(q.px, q.py, rad, 0, Math.PI * 2); ctx.fill();
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
  return { set, get state() { return state; } };
})();

/* ============================================================
   5. LAYER A — local intents (offline, instant)
   ============================================================ */
const STOPWORDS = new Set(["i","me","my","the","a","an","to","on","at","for","of","in","is","are","was","it","its","and","or",
  "hit","just","now","new","set","update","change","updated","please","jarvis","show","open","view","display","see","pull",
  "up","bring","whats","what","hows","how","panel","tab","lb","lbs","kg","kgs","reps","today"]);

const KEYWORD_MAP = [
  [["today", "schedule", "class", "classes", "school"], "today"],
  [["uni", "university", "apps", "applications", "application", "deadline", "deadlines", "ucas", "ucat", "sat", "ouac", "waterloo", "berkeley"], "university-ops"],
  [["training", "gym", "jump", "vertical", "lift", "lifts", "workout", "clean", "squat"], "vertical-protocol"],
  [["projects", "builds", "build", "shipped"], "active-builds"],
  [["stats", "profile", "numbers"], "life-stats"],
  [["ecs", "ec", "extracurricular", "extracurriculars", "rating", "rated", "tier"], "ec-portfolio"],
];

function fuzzyPanel(words) {
  // exact keyword map first
  for (const w of words) {
    for (const [keys, id] of KEYWORD_MAP) if (keys.includes(w)) return panels.find((p) => p.id === id) || null;
  }
  // fuzzy vs any panel's id/tab/title tokens
  let best = null, bestScore = 0;
  for (const p of panels) {
    const hay = (p.id.replace(/-/g, " ") + " " + p.tab + " " + p.title).toLowerCase();
    let score = 0;
    for (const w of words) if (w.length > 2 && hay.includes(w)) score++;
    if (score > bestScore) { bestScore = score; best = p; }
  }
  return bestScore > 0 ? best : null;
}

function significantWords(text) {
  return text.toLowerCase().replace(/[^a-z0-9\s'-]/g, " ").split(/\s+/)
    .filter((w) => w && !STOPWORDS.has(w) && !/^\d/.test(w));
}

// open-intent: explicit verb, or a short bare-keyword message
function tryOpenIntent(text) {
  const low = text.toLowerCase().trim();
  const verb = /^(show|open|view|display|pull up|bring up|see)\b/.test(low);
  const words = significantWords(low);
  if (!verb && words.length > 4) return null;
  if (!verb && /[?]/.test(text)) return null; // questions go to the uplink
  const p = fuzzyPanel(words.length ? words : low.split(/\s+/));
  if (!p) return null;
  return p;
}

/* Local edit parser — common mutations with zero AI.
   "add <thing> to <panel>[ called <name>]"  → append a row
   "update/set/change <row words> <number>" or "<number> on <row>" → replace numeric value, keep units */
function tryLocalEdit(text) {
  const t = text.trim();

  // --- add row ---
  let m = t.match(/^add\s+(.+?)\s+(?:to|into|under)\s+(.+?)(?:\s+called\s+(.+))?$/i);
  if (m) {
    const thing = (m[3] || m[1]).trim();
    const panelWords = significantWords(m[2]);
    const p = fuzzyPanel(panelWords.length ? panelWords : m[2].toLowerCase().split(/\s+/));
    if (p) {
      const sec = p.sections[p.sections.length - 1];
      sec.rows.push({ l: thing.replace(/^\w/, (c) => c.toUpperCase()), r: "NEW", _edited: true });
      savePanels();
      openPanel(p.id);
      return 'Added "' + thing + '" to ' + p.title + ".";
    }
    return null;
  }

  // --- numeric update ---
  const nums = t.match(/-?\d+(?:\.\d+)?/g);
  if (!nums || nums.length !== 1) return null;
  const explicit = /^(update|set|change)\b/i.test(t);
  const words = significantWords(t);
  if (!words.length) return null;
  let hit = null, hitPanel = null, bestLen = -1;
  for (const p of panels) for (const sec of p.sections) for (const row of sec.rows) {
    const label = String(row.l).toLowerCase();
    if (words.every((w) => label.includes(w)) && label.length > bestLen) {
      hit = row; hitPanel = p; bestLen = label.length;
    }
  }
  if (!hit) return null;
  if (!explicit && !/\d/.test(hit.r) && !hit.meter) return null; // don't guess on non-numeric rows
  if (/\d/.test(hit.r)) hit.r = hit.r.replace(/-?\d+(?:\.\d+)?/, nums[0]); // keep trailing units (LB, %, …)
  else hit.r = nums[0];
  if (hit.meter != null) hit.meter = clamp(+nums[0], 0, 100);
  hit._edited = true;
  savePanels();
  openPanel(hitPanel.id);
  return hit.l + " → " + hit.r + " in " + hitPanel.title + ".";
}

function exportText() {
  return [
    "You are JARVIS, the AI layer of IAN.OS — Ian's life dashboard (Grade 12, Bayview Glen, Toronto; dual-track Fall 2027: UK Medicine + North America Mechatronics).",
    "Below is the dashboard's current state as a JSON array of panel specs. From now on, answer EVERY request I make in this chat by replying with ONE raw JSON object only — no markdown fences, no prose outside it — in exactly this shape:",
    '{"reply":"1-3 sentence JARVIS-style reply (composed, dry wit, brief, occasional \'sir\')","action":"open|create|update|delete|none","panelId":"target panel id or null","spec":<full panel spec or null>}',
    'Panel spec shape: {"id":"kebab-case","title":"PANEL TITLE","tab":"Short Tab","sections":[{"label":"Section label or null","rows":[{"l":"Main text","sub":"small subtext (optional)","r":"RIGHT VALUE","warn":true (optional),"meter":0-100 (optional)}]}]}',
    'Rules: "update" must include the COMPLETE panel spec (it replaces the whole panel). "create" uses a new kebab-case id. Never "delete" the core panels: ' + CORE_IDS.join(", ") + ". I will paste your JSON straight into the dashboard input.",
    "",
    "CURRENT PANELS:",
    JSON.stringify(panels),
  ].join("\n");
}

async function doExport() {
  const text = exportText();
  let copied = false;
  try { await navigator.clipboard.writeText(text); copied = true; } catch {}
  if (!copied) {
    try {
      const ta = document.createElement("textarea");
      ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta); ta.select();
      copied = document.execCommand("copy"); ta.remove();
    } catch {}
  }
  say(copied
    ? "State package copied to clipboard, sir. Paste it into a Claude chat, ask for anything, then paste the JSON reply back here."
    : "Clipboard access was blocked — copy the package below manually, sir.");
  addMsg("ai", text, { blob: true });
  if (!copied) toast("Clipboard blocked by the browser — select the printed block and copy it manually.");
}

/* ============================================================
   6. LAYER B — live AI uplink (best effort, auto-failover)
   ============================================================ */
const ROUTES = [
  { name: "claude.ai proxy (api.anthropic.com)",
    async call(prompt) {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, messages: [{ role: "user", content: prompt }] }),
      });
      if (!res.ok) throw new Error("HTTP " + res.status + " — " + (await res.text().catch(() => "")).slice(0, 140));
      const data = await res.json();
      const text = data && data.content && data.content[0] && data.content[0].text;
      if (!text) throw new Error("empty completion");
      return text;
    } },
  { name: "window.claude.complete",
    async call(prompt) {
      if (!(window.claude && typeof window.claude.complete === "function"))
        throw new Error("window.claude.complete not present in this environment");
      return await window.claude.complete(prompt);
    } },
];
let routeWinner = null;

async function uplink(prompt) {
  const errs = [];
  const order = routeWinner ? [routeWinner, ...ROUTES.filter((r) => r !== routeWinner)] : ROUTES.slice();
  for (const route of order) {
    try {
      const out = await route.call(prompt);
      routeWinner = route;
      return out;
    } catch (e) { errs.push(route.name + ": " + (e && e.message || e)); }
  }
  routeWinner = null;
  throw new Error("All uplink routes failed → " + errs.join(" · "));
}

function buildPrompt(userMsg, nudge) {
  const persona = 'You are JARVIS, the AI layer of IAN.OS. Persona: composed, dry wit, brief, occasionally addresses the user as "sir". Replies are 1-3 sentences.';
  const ctx = "User context: Ian, Grade 12 at Bayview Glen, Toronto. Dual-track university plan, Fall 2027 entry — UK Medicine (UCAT summer 2026; UCAS hard deadline Oct 15 2026) and Mechatronics in North America (Waterloo, McMaster, TMU via OUAC; US Common App; UC Berkeley test-blind). SAT 1360, retaking Aug–Sep 2026 targeting 1450–1500. Grade 11 average 97. Courses: AP Calculus, AP Biology, AP Chemistry, AP Physics, Music, English. Vertical jump training program (goal: rim contact at 5'9\"). Projects: IAN.OS, StudyHub, ClinicOS, portfolio site. Canadian Regional Director of the World Wave Music Festival. 10+ years of alto saxophone and piano.";
  const proto = 'Respond with ONE raw JSON object only — no markdown fences, no prose before or after it: {"reply":"1-3 sentence JARVIS reply","action":"open|create|update|delete|none","panelId":"target panel id or null","spec":<full panel spec or null>}. Panel spec shape: {"id":"kebab-case","title":"PANEL TITLE","tab":"Short Tab","sections":[{"label":"Section label or null","rows":[{"l":"Main text","sub":"optional subtext","r":"RIGHT VALUE","warn":true optional,"meter":0-100 optional}]}]}. For action "update" include the COMPLETE spec of the panel (it replaces the panel). For "create" invent a sensible new kebab-case id. Never delete the core panels: ' + CORE_IDS.join(", ") + ".";
  const hist = history.slice(-8).map((h) => (h.role === "user" ? "USER: " : "JARVIS: ") + h.text).join("\n");
  return [
    persona, ctx,
    "CURRENT PANELS JSON:\n" + JSON.stringify(panels),
    hist ? "RECENT CONVERSATION:\n" + hist : "",
    "NEW MESSAGE:\n" + userMsg,
    proto,
    nudge ? "IMPORTANT: your previous reply could not be parsed. Reply with the raw JSON object ONLY." : "",
  ].filter(Boolean).join("\n\n");
}

// Brace-matching JSON extractor — survives markdown fences and surrounding prose.
function extractJSON(text) {
  const s = String(text);
  for (let i = 0; i < s.length; i++) {
    if (s[i] !== "{") continue;
    let depth = 0, inStr = false, escd = false;
    for (let j = i; j < s.length; j++) {
      const ch = s[j];
      if (inStr) {
        if (escd) escd = false;
        else if (ch === "\\") escd = true;
        else if (ch === '"') inStr = false;
      } else if (ch === '"') inStr = true;
      else if (ch === "{") depth++;
      else if (ch === "}") {
        depth--;
        if (depth === 0) {
          try { return JSON.parse(s.slice(i, j + 1)); } catch {}
          break; // balanced but unparsable → try next opening brace
        }
      }
    }
  }
  return null;
}

// Apply a protocol object (from uplink or paste). Returns the reply text.
function applyAI(obj) {
  const action = String(obj.action || "none");
  let reply = typeof obj.reply === "string" && obj.reply ? obj.reply : null;

  if (action === "open") {
    const id = obj.panelId && panels.some((p) => p.id === obj.panelId)
      ? obj.panelId
      : (fuzzyPanel(significantWords(String(obj.panelId || ""))) || {}).id;
    if (id) { openPanel(id); return reply || "On screen."; }
    return reply || "I couldn't find that panel, sir.";
  }

  if (action === "create") {
    const spec = sanitizePanel(obj.spec);
    if (!spec) return "That create request had no usable panel spec, sir.";
    let id = spec.id, n = 2;
    while (panels.some((p) => p.id === id)) id = spec.id + "-" + n++;
    spec.id = id;
    panels.push(spec);
    savePanels();
    renderChips();
    openPanel(id);
    return reply || ('Panel "' + spec.title + '" is up, sir.');
  }

  if (action === "update") {
    const spec = sanitizePanel(obj.spec);
    if (!spec) return "That update carried no complete panel spec — nothing changed.";
    const targetId = obj.panelId || spec.id;
    const i = panels.findIndex((p) => p.id === targetId);
    if (i === -1) return 'No panel with id "' + targetId + '" — nothing changed.';
    spec.id = panels[i].id; // id is immutable
    panels[i] = spec;
    savePanels();
    renderChips();
    openPanel(spec.id);
    return reply || (spec.title + " updated.");
  }

  if (action === "delete") {
    const targetId = obj.panelId || (obj.spec && obj.spec.id);
    if (!targetId) return "Delete requested with no panel id — nothing changed.";
    if (CORE_IDS.includes(targetId)) return "That's a core panel, sir. It stays.";
    const i = panels.findIndex((p) => p.id === targetId);
    if (i === -1) return 'No panel with id "' + targetId + '" — nothing changed.';
    const title = panels[i].title;
    const oi = openIds.indexOf(targetId);
    if (oi !== -1) openIds.splice(oi, 1);
    panels.splice(i, 1);
    savePanels();
    renderDock();
    return reply || ('Panel "' + title + '" deleted.');
  }

  return reply || "Noted.";
}

async function askAI(userMsg) {
  let raw = await uplink(buildPrompt(userMsg, false));
  let obj = extractJSON(raw);
  if (!obj || typeof obj !== "object" || !("action" in obj || "reply" in obj)) {
    raw = await uplink(buildPrompt(userMsg, true)); // one automatic retry
    obj = extractJSON(raw);
  }
  if (!obj || typeof obj !== "object") throw new Error("uplink replied but no JSON object could be extracted");
  return applyAI(obj);
}

// --- diagnostics: ping each route, report per-route status ---
async function doDiagnostics() {
  say("Running uplink diagnostics…");
  orb.set("thinking");
  const lines = [];
  for (const route of ROUTES) {
    try {
      const ctl = typeof AbortController !== "undefined" ? new AbortController() : null;
      const timer = ctl ? setTimeout(() => ctl.abort(), 9000) : null;
      // route 2 ignores the signal; route 1 races the timeout via fetch abort
      const probe = route.call('Reply with the single word "pong".');
      const out = await (ctl
        ? Promise.race([probe, new Promise((_, rej) => setTimeout(() => rej(new Error("timeout after 9s")), 9200))])
        : probe);
      if (timer) clearTimeout(timer);
      lines.push("ONLINE  · " + route.name + " → " + String(out).slice(0, 60).replace(/\s+/g, " "));
    } catch (e) {
      lines.push("FAILED  · " + route.name + " → " + (e && e.message || e).slice(0, 160));
    }
  }
  orb.set("idle");
  hideThinking();
  addMsg("ai", "UPLINK DIAGNOSTICS\n" + lines.join("\n") + "\n\nThe export → paste pipeline works regardless.");
}

/* ============================================================
   7. SEND PIPELINE — Layer C paste → Layer A local → Layer B uplink
   ============================================================ */
let busy = false;

async function handleSend(rawText) {
  const text = (rawText != null ? rawText : $("#cmd").value).trim();
  if (!text || busy) return;
  $("#cmd").value = "";
  addMsg("user", text);

  // ---- Layer C: pasted protocol JSON ----
  if (text[0] === "{") {
    const obj = extractJSON(text);
    if (obj && typeof obj === "object" && ("action" in obj)) {
      orb.set("speaking");
      say(applyAI(obj));
      setTimeout(() => orb.set("idle"), 1200);
    } else {
      say("That looked like JSON, but I couldn't find a valid protocol object with an \"action\" field in it, sir.", { warn: true });
      toast('Expected shape: {"reply":"...","action":"open|create|update|delete|none","panelId":...,"spec":...}');
    }
    return;
  }

  const low = text.toLowerCase().replace(/[.!]+$/, "").trim();

  // ---- Layer A: fixed commands ----
  if (low === "close" || low === "esc" || low === "escape" || low === "close panels") {
    closeAllPanels(); say("Panels dismissed."); return;
  }
  if (low === "reset panels" || low === "reset") {
    panels = defaultPanels(); applyIanosOverlay(); savePanels();
    closeAllPanels(); renderChips();
    say("Factory panels restored, sir. All six defaults are back."); return;
  }
  if (low === "export") { await doExport(); return; }
  if (low === "diagnostics") { await doDiagnostics(); return; }
  if (low === "help" || low === "commands") {
    say("Local: open panels by name, \"add … to …\", \"update/set … <number>\", close, reset panels, export, diagnostics. Anything else goes to the uplink — or paste protocol JSON from a Claude chat.");
    return;
  }

  // ---- Layer A: local edit parser ----
  try {
    const edited = tryLocalEdit(text);
    if (edited) {
      orb.set("speaking");
      say(edited + " Handled locally — no uplink needed.");
      setTimeout(() => orb.set("idle"), 1200);
      return;
    }
  } catch (e) { /* fall through to other layers */ }

  // ---- Layer A: open intent ----
  const p = tryOpenIntent(text);
  if (p) {
    openPanel(p.id);
    orb.set("speaking");
    say(p.title + " on screen.");
    setTimeout(() => orb.set("idle"), 1200);
    return;
  }

  // ---- Layer B: uplink ----
  busy = true;
  orb.set("thinking");
  showThinking();
  try {
    const reply = await askAI(text);
    orb.set("speaking");
    say(reply);
    setTimeout(() => { if (orb.state === "speaking") orb.set("idle"); }, 1500);
  } catch (e) {
    orb.set("idle");
    hideThinking();
    say("Uplink offline. " + (e && e.message || e), { warn: true });
    toast("No live AI in this environment — type `export`, paste it into a Claude chat, then paste Claude's JSON reply back here. That pipeline always works.");
  } finally {
    busy = false;
  }
}

$("#send").addEventListener("click", () => handleSend());
$("#cmd").addEventListener("keydown", (e) => { if (e.key === "Enter") handleSend(); });

/* ============================================================
   8. VOICE — SpeechRecognition in, speechSynthesis out
   ============================================================ */
let voiceOut = false;

// -- output --
function pickVoice() {
  try {
    const vs = speechSynthesis.getVoices();
    return vs.find((v) => /en[-_]GB/i.test(v.lang) && /male|daniel|arthur|george|oliver/i.test(v.name))
        || vs.find((v) => /en[-_]GB/i.test(v.lang))
        || vs.find((v) => /^en/i.test(v.lang))
        || null;
  } catch { return null; }
}
let speakGuard = null;
function speak(text) {
  if (!voiceOut || !("speechSynthesis" in window)) return;
  try {
    speechSynthesis.cancel();
    clearTimeout(speakGuard);
    const u = new SpeechSynthesisUtterance(text);
    const v = pickVoice();
    if (v) u.voice = v;
    u.rate = 1.03; u.pitch = 0.92;
    orb.set("speaking");
    const done = () => { clearTimeout(speakGuard); if (orb.state === "speaking") orb.set("idle"); };
    u.onend = done; u.onerror = done;
    // stuck-state guard: some engines never fire onend
    speakGuard = setTimeout(done, Math.min(25000, 2500 + text.length * 70));
    speechSynthesis.speak(u);
  } catch { if (orb.state === "speaking") orb.set("idle"); }
}
if ("speechSynthesis" in window) { try { speechSynthesis.getVoices(); } catch {} }

$("#vox").addEventListener("click", () => {
  voiceOut = !voiceOut;
  $("#vox").classList.toggle("on", voiceOut);
  if (voiceOut && !("speechSynthesis" in window)) {
    toast("Speech synthesis isn't supported in this browser — voice replies unavailable.");
    voiceOut = false; $("#vox").classList.remove("on");
    return;
  }
  if (!voiceOut) { try { speechSynthesis.cancel(); } catch {} }
  toast(voiceOut ? "Voice replies ON." : "Voice replies off.");
});

// -- input --
let rec = null, recActive = false;
function stopMic() {
  recActive = false;
  $("#mic").classList.remove("live");
  if (orb.state === "listening") orb.set("idle");
  if (rec) { try { rec.stop(); } catch {} }
}
$("#mic").addEventListener("click", () => {
  if (recActive) { stopMic(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast("Voice input isn't supported in this browser. Chrome and Safari work best."); return; }
  try {
    rec = new SR();
    rec.lang = "en-CA";
    rec.interimResults = true;
    rec.continuous = false;
    let finalText = "";
    rec.onresult = (ev) => {
      let interim = "";
      for (let i = ev.resultIndex; i < ev.results.length; i++) {
        const alt = ev.results[i][0].transcript;
        if (ev.results[i].isFinal) finalText += alt;
        else interim += alt;
      }
      $("#cmd").value = (finalText + interim).trim(); // live interim in the input
    };
    rec.onend = () => {
      const wasActive = recActive;
      stopMic();
      const t = $("#cmd").value.trim();
      if (wasActive && t) handleSend(t); // auto-send on final
    };
    rec.onerror = (ev) => {
      stopMic();
      const why = ev && ev.error;
      if (why === "not-allowed" || why === "service-not-allowed")
        toast("Microphone permission blocked — allow mic access for this site and try again.");
      else if (why === "no-speech") toast("Didn't catch anything, sir.");
      else toast("Voice input error: " + (why || "unknown"));
    };
    recActive = true;
    $("#mic").classList.add("live");
    orb.set("listening");
    rec.start();
  } catch (e) {
    stopMic();
    toast("Couldn't start voice input: " + e.message);
  }
});

/* ============================================================
   9. BOOT
   ============================================================ */
loadPanels();
savePanels();
renderChips();
renderDock();
setTimeout(() => {
  addMsg("ai", "Systems online. Panels are in the tabs — or just ask. Type `help` for local commands, `export` to brief Claude.");
}, 500);
